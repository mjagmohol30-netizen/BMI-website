<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BMITrack</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- NAVIGATION BAR  -->
<div class="center">
      <div class="menu">
        <input type="checkbox" name="" id="menu" />
        <div class="logo">
          <a href="home.html">BMITrack </a>
          <label for="menu"></label>
        </div>

        <div class="items">
          <a href="home.html" class="item">Home</a>
          <a href="aboutUs.html" class="item">About Us</a>
          <a href="services.html" class="item">Services</a>
          
        </div>
      </div>
    </div>
    <!--END of NAV BAR-->


    <!-- MAIN CONTENT -->
    <main class="main-wrapper">


        <!--   BMI CALCULATOR-->
        <section class="container">

            <div class="box">

                <h1>BMITrack</h1>

                <div class="content">
<!-- Name Input -->
<div class="inputName">
    <label for="name"></label>
    <input type="text" id="name" placeholder="Enter your name" >
</div>

                    <!-- Gender Selection -->
                    <div class="gender">

                        <label class="container">
                            <input type="radio" name="radio" id="m">
                            <p class="text">Male</p>
                            <span class="checkmark"></span>
                        </label>

                        <label class="container">
                            <input type="radio" name="radio" id="f">
                            <p class="text">Female</p>
                            <span class="checkmark"></span>
                        </label>

                    </div>


                    <!-- Height and Weight Inputs -->
                    <div class="containerHW">

                        <div class="inputH">
                            <label for="height">Height (cm)</label>
                            <input type="number" id="height" required>
                        </div>

                        <div class="inputW">
                            <label for="weight">Weight (kg)</label>
                            <input type="number" id="weight" required>
                        </div>

                    </div>


                    <!-- Calculate Button -->
                    <button
                        class="calculate"
                        id="submit"
                        onclick="calculate();">

                        Calculate BMI

                    </button>

                </div>


                <!-- BMI Result -->
                <div class="result">

                    <p>Your BMI is</p>

                    <div id="result">00.00</div>

                    <p class="comment"></p>

                </div>

            </div>

        </section>


        <!-- =========================
             SIDE CONTAINER
        ========================== -->
        <aside class="SideContainer">


            <!-- Health Advice -->
            <div class="bmi-advice">

                <h3>Health Advice</h3>

                <p id="adviceText">
                    Enter your details and calculate your BMI
                    to see recommendations and tips.
                </p>

            </div>


            <!-- History -->
            <div class="historyContainer">

                <h3>History</h3>

                <p id="historyText"></p>

            </div>

        </aside>

    </main>


    <!-- =========================
         MODAL
    ========================== -->
    <div id="myModal" class="modal">

        <div class="modal-content">

            <span class="close">&times;</span>

            <p id="modalText"></p>

        </div>

    </div>


    <!-- JavaScript -->
    <script src="script.js"></script>

</body>

</html>
